# Route UF output through the local tee listener
# The tee sends fake ACK responses via ack_handler.py so useACK=true works.
# Set useACK=false if you want slightly lower overhead and don't need delivery guarantees.

[tcpout]
defaultGroup = etairos_tee

[tcpout:etairos_tee]
server = 127.0.0.1:19997
useACK = true
compressed = false
