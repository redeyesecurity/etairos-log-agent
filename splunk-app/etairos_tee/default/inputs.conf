# Start the tee listener as a persistent scripted input
[script://./bin/start_listener.py]
interval = -1
sourcetype = etairos:internal
index = _internal
disabled = 0

# Pick up the app's own logs (cross-platform path handled by Splunk)
[monitor://$SPLUNK_HOME/var/log/splunk/etairos_tee.log]
sourcetype = etairos:tee:log
index = _internal
disabled = 0
