# etairos-log-agent configuration
# All CLI flags can be set here. CLI args override config file values.
# Start with: python3 agent.py --config config.yaml

# ---------------------------------------------------------------------------
# Inbound listener (from Splunk Universal Forwarder)
# ---------------------------------------------------------------------------
listener:
  host: "0.0.0.0"       # bind address — use 0.0.0.0 for all interfaces
  port: 9997             # port UF connects to (default Splunk S2S port)

  tls:
    enabled: false       # set true to require TLS from UF
    cert: ""             # path to server certificate PEM  e.g. /etc/etairos/certs/server.crt
    key: ""              # path to server private key PEM  e.g. /etc/etairos/certs/server.key
    ca: ""               # path to CA cert for client auth (optional — leave blank to skip client auth)
    verify_client: false # true = require UF to present a cert signed by ca above
    ignore_ssl: false    # true = accept any UF cert, skip all verification (testing only)

# ---------------------------------------------------------------------------
# Local output (decoded events written to disk)
# ---------------------------------------------------------------------------
output:
  file: "/var/log/etairos/events.log"   # absolute path to output file
  # Future: type: s3 | webhook | stdout
  # Future: s3_bucket, s3_prefix, webhook_url

# ---------------------------------------------------------------------------
# Forward (upstream to real Splunk indexer)
# ---------------------------------------------------------------------------
forward:
  enabled: true
  host: ""               # indexer hostname or IP  e.g. splunk-indexer.corp
  port: 9997             # indexer S2S port (almost always 9997)

  tls:
    enabled: false       # set true if indexer requires TLS
    cert: ""             # client cert PEM for mutual TLS  e.g. /etc/etairos/certs/client.crt
    key: ""              # client key PEM                  e.g. /etc/etairos/certs/client.key
    ca: ""               # CA cert to verify indexer cert  e.g. /etc/etairos/certs/ca.crt
    ignore_ssl: false    # true = skip indexer cert verification (testing only — never in prod)

  failover:
    mode: "fail-open"    # fail-open  = drop frames if indexer down, keep writing locally
                         # fail-closed = buffer frames in memory until indexer recovers
    queue_max: 100000    # max frames to buffer in fail-closed mode before dropping oldest
    reconnect_delay: 2   # seconds between reconnect attempts when indexer is unreachable
    retry_forever: true  # true = keep retrying forever; false = give up after max_retries
    max_retries: 0       # 0 = unlimited (only used when retry_forever: false)

# ---------------------------------------------------------------------------
# Lakehouse output (OCSF formatted — runs alongside the flat file output)
# ---------------------------------------------------------------------------
# Requires: pip install pyarrow        (for local-parquet or s3)
#           pip install pyarrow boto3  (for s3)
# local-json works with no extra deps.
  lakehouse:
    enabled: false

    # Destination: local-json | local-parquet | s3
    destination: "local-json"

    # Local base path (used for local-json and local-parquet)
    # Files are written as Hive partitions:
    #   <path>/class_uid=3005/year=2026/month=04/day=07/ocsf_<ts>_<id>.jsonl
    path: "/var/log/etairos/lakehouse"

    # Flush a new file every N events OR every flush_interval seconds
    batch_size: 1000
    flush_interval: 60       # seconds

    # Partition granularity: day | hour | none
    partition_by: "day"

    # S3 settings (only used when destination: s3)
    s3:
      bucket: ""             # e.g. my-security-lakehouse
      prefix: "etairos/ocsf" # S3 key prefix (no leading slash)
      region: "us-east-1"
      access_key: ""         # leave blank to use IAM role / env vars
      secret_key: ""

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: "INFO"          # DEBUG | INFO | WARNING | ERROR
  log_every_n: 500       # log a progress line every N events per connection
